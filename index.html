<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boss Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #07070d;
  --bg2: #0d0d18;
  --surface: #10101e;
  --surface2: #161626;
  --surface3: #1c1c30;
  --gold: #c8a84b;
  --gold2: #e8c96a;
  --gold3: #f5dfa0;
  --gold-dim: rgba(200,168,75,0.12);
  --gold-glow: rgba(200,168,75,0.25);
  --green: #3ddc84;
  --green-dim: rgba(61,220,132,0.12);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --purple: #a78bfa;
  --text: #f0ebe0;
  --text2: #9d9080;
  --text3: #5a5248;
  --border: rgba(200,168,75,0.15);
  --border2: rgba(200,168,75,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-family: 'Crimson Pro', serif;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,168,75,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(96,165,250,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* CONNECTION BADGE */
.conn-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid;
  transition: 0.3s;
}
.conn-badge .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}
.conn-online  { background: var(--green-dim); border-color: rgba(61,220,132,0.3); color: var(--green); }
.conn-online .dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s ease-in-out infinite; }
.conn-offline { background: var(--red-dim); border-color: rgba(248,113,113,0.3); color: var(--red); }
.conn-offline .dot { background: var(--red); }
.conn-loading { background: var(--yellow-dim); border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.conn-loading .dot { background: var(--yellow); animation: blink 0.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* HEADER */
.header {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 40px 22px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(10,10,20,0.9) 0%, transparent 100%);
  backdrop-filter: blur(4px);
}
.header-left { display:flex; flex-direction:column; gap:4px; }
.header-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 28px; color: var(--gold2);
  letter-spacing: 3px;
  text-shadow: 0 0 40px rgba(200,168,75,0.4);
  line-height: 1;
}
.header-sub {
  font-size: 13px; color: var(--text3);
  letter-spacing: 2px; text-transform: uppercase;
  font-family: 'Cinzel', serif;
}
.header-right { display:flex; align-items:center; gap:16px; flex-wrap: wrap; justify-content: flex-end; }
.live-clock {
  font-family: 'Cinzel', serif; font-size: 22px;
  color: var(--gold); letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(200,168,75,0.5);
  min-width: 110px; text-align: right;
}
.clock-date {
  font-family: 'Cinzel', serif; font-size: 11px;
  color: var(--text3); letter-spacing: 2px;
  text-align: right; margin-top: 2px;
}
.admin-btn {
  background: var(--gold-dim); border: 1px solid var(--border);
  color: var(--gold2); padding: 10px 20px; border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 13px;
  cursor: pointer; transition: 0.2s; letter-spacing: 1px;
}
.admin-btn:hover { background: var(--gold-glow); border-color: var(--gold); }

/* FILTERS */
.filters {
  position: relative; z-index: 10;
  display: flex; gap: 8px;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border2);
  flex-wrap: wrap;
}
.filter-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.07);
  color: var(--text3); padding: 8px 16px; border-radius: 6px;
  cursor: pointer; transition: 0.2s;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.5px;
}
.filter-btn:hover { border-color: var(--border); color: var(--text2); }
.filter-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold2); }
.filter-count {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 10px; margin-left: 6px;
  background: rgba(255,255,255,0.08); color: var(--text2);
}
.filter-btn.active .filter-count { background: var(--gold-glow); color: var(--gold2); }

/* MAIN */
.main { position: relative; z-index: 10; padding: 30px 40px; }
.boss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

/* BOSS CARD */
.boss-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden; position: relative;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.boss-card:hover { transform: translateY(-3px); border-color: var(--border); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.boss-card.status-green .card-accent { background: var(--green); box-shadow: 0 0 10px rgba(61,220,132,0.4); }
.boss-card.status-yellow .card-accent { background: var(--yellow); box-shadow: 0 0 10px rgba(251,191,36,0.4); }
.boss-card.status-red .card-accent { background: var(--red); box-shadow: 0 0 10px rgba(248,113,113,0.4); }
.boss-card.status-none .card-accent { background: var(--text3); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 20px 0; }
.boss-name { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold2); font-weight: 600; line-height: 1.2; }
.status-badge {
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 1px; padding: 4px 10px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase; margin-top: 2px;
}
.badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,220,132,0.25); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
.badge-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.badge-none { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid rgba(255,255,255,0.07); }
.card-body { padding: 14px 20px 0; }
.info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 15px; color: var(--text2); }
.info-row .icon { font-size: 13px; color: var(--text3); min-width: 16px; }
.info-val { color: var(--text); }
.timer-area { padding: 12px 20px 8px; text-align: center; }
.timer-big { font-family: 'Cinzel', serif; font-size: 34px; font-weight: 700; letter-spacing: 2px; line-height: 1; }
.timer-sub { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; color: var(--text3); font-family: 'Cinzel', serif; }
.timer-green { color: var(--green); text-shadow: 0 0 20px rgba(61,220,132,0.5); }
.timer-yellow { color: var(--yellow); text-shadow: 0 0 20px rgba(251,191,36,0.5); }
.timer-red { color: var(--red); text-shadow: 0 0 20px rgba(248,113,113,0.5); animation: pulse-red 1.5s ease-in-out infinite; }
.timer-none { color: var(--text3); }
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }
.progress-wrap { margin: 8px 20px 14px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 20px; transition: width 1s linear; }
.prog-green { background: linear-gradient(90deg, rgba(61,220,132,0.4), var(--green)); }
.prog-yellow { background: linear-gradient(90deg, rgba(251,191,36,0.4), var(--yellow)); }
.prog-red { background: linear-gradient(90deg, rgba(248,113,113,0.4), var(--red)); }
.card-footer { display: flex; gap: 8px; padding: 0 20px 18px; }
.card-btn {
  flex: 1; border: none; padding: 10px; border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 12px;
  cursor: pointer; transition: 0.2s; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-now { background: var(--green-dim); border: 1px solid rgba(61,220,132,0.3); color: var(--green); }
.btn-now:hover { background: rgba(61,220,132,0.2); }
.btn-manual { background: var(--blue-dim); border: 1px solid rgba(96,165,250,0.3); color: var(--blue); }
.btn-manual:hover { background: rgba(96,165,250,0.2); }

/* EMPTY / LOADING STATE */
.empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 18px; font-family: 'Cinzel', serif; margin-bottom: 8px; color: var(--text2); }
.empty-state small { font-size: 14px; }

/* ADMIN MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 1000;
  display: flex; justify-content: center; align-items: center;
  backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  width: 880px; max-width: 95vw; max-height: 90vh;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
  display: flex; flex-direction: column;
  transform: translateY(20px); transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 28px; border-bottom: 1px solid var(--border2);
  background: var(--surface2); flex-shrink: 0;
}
.modal-header h2 { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--gold2); letter-spacing: 2px; }
.modal-close {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  color: var(--red); width: 36px; height: 36px; border-radius: 8px;
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.modal-close:hover { background: rgba(248,113,113,0.2); }
.modal-body { overflow-y: auto; padding: 28px; flex: 1; }
.modal-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--bg2); padding: 4px; border-radius: 10px;
}
.tab-btn {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px;
  cursor: pointer; background: transparent; color: var(--text3); transition: 0.2s;
}
.tab-btn.active { background: var(--surface2); color: var(--gold2); border: 1px solid var(--border); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-family: 'Cinzel', serif; font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.form-input, .form-select {
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); padding: 11px 14px; border-radius: 8px;
  font-size: 15px; font-family: 'Crimson Pro', serif; transition: 0.2s; width: 100%;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--gold); }
.form-select { cursor: pointer; }
.spawn-field { display: grid; grid-template-columns: 1fr auto; gap: 6px; }
.btn-add {
  width: 100%; padding: 12px;
  background: var(--green-dim); border: 1px solid rgba(61,220,132,0.3);
  color: var(--green); border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px;
  cursor: pointer; transition: 0.2s; margin-top: 6px;
}
.btn-add:hover { background: rgba(61,220,132,0.2); }
.btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

/* BOSS LIST */
.boss-list-item {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px; transition: 0.2s;
}
.boss-list-item:hover { border-color: var(--border); }
.boss-list-info { flex: 1; }
.boss-list-name { font-family: 'Cinzel', serif; color: var(--gold2); font-size: 16px; margin-bottom: 2px; }
.boss-list-timing { font-size: 13px; color: var(--text3); }
.boss-list-kill { font-size: 12px; color: var(--text3); margin-top: 2px; }
.boss-list-actions { display: flex; gap: 6px; }
.list-btn { padding: 8px 14px; border-radius: 7px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.5px; cursor: pointer; transition: 0.2s; }
.btn-edit { background: var(--gold-dim); border: 1px solid var(--border); color: var(--gold2); }
.btn-edit:hover { background: var(--gold-glow); }
.btn-reset { background: var(--blue-dim); border: 1px solid rgba(96,165,250,0.3); color: var(--blue); }
.btn-reset:hover { background: rgba(96,165,250,0.2); }
.btn-delete { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
.btn-delete:hover { background: rgba(248,113,113,0.2); }
.edit-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 8px; }

/* SWAL DARK */
.swal2-popup { background: var(--surface2) !important; color: var(--text) !important; border: 1px solid var(--border) !important; font-family: 'Crimson Pro', serif !important; border-radius: 16px !important; }
.swal2-title { color: var(--gold2) !important; font-family: 'Cinzel', serif !important; }
.swal2-confirm { background: var(--green-dim) !important; border: 1px solid rgba(61,220,132,0.3) !important; color: var(--green) !important; font-family: 'Cinzel', serif !important; border-radius: 8px !important; box-shadow: none !important; }
.swal2-cancel { background: var(--red-dim) !important; border: 1px solid rgba(248,113,113,0.3) !important; color: var(--red) !important; font-family: 'Cinzel', serif !important; border-radius: 8px !important; box-shadow: none !important; }
.swal2-input { background: var(--bg) !important; border: 1px solid var(--border) !important; color: var(--text) !important; border-radius: 8px !important; font-family: 'Crimson Pro', serif !important; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

@media (max-width: 700px) {
  .header { padding: 18px 20px; flex-direction: column; gap: 14px; text-align: center; }
  .header-right { flex-direction: row; justify-content: center; }
  .live-clock { text-align: center; }
  .clock-date { text-align: center; }
  .filters { padding: 14px 20px; }
  .main { padding: 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .boss-list-actions { flex-direction: column; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-title">⚔ Boss Tracker</div>
    <div class="header-sub">MMORPG Spawn Monitor</div>
  </div>
  <div class="header-right">
    <span class="conn-badge conn-loading" id="connBadge">
      <span class="dot"></span>
      <span id="connText">CONECTANDO</span>
    </span>
    <div>
      <div class="live-clock" id="liveClock">00:00:00</div>
      <div class="clock-date" id="liveDate">—</div>
    </div>
    <button class="admin-btn" onclick="openAdmin()">⚙ Admin</button>
  </div>
</header>

<div class="filters" id="filterBar"></div>

<main class="main">
  <div class="boss-grid" id="bossGrid">
    <div class="empty-state"><div class="icon">⚔</div><p>Cargando bosses...</p></div>
  </div>
</main>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>⚙ Panel Admin</h2>
      <button class="modal-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('add')">Agregar Boss</button>
        <button class="tab-btn" onclick="switchTab('manage')">Gestionar Bosses</button>
      </div>

      <div class="tab-panel active" id="tab-add">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Nombre del Boss</label>
            <input type="text" id="addName" class="form-input" placeholder="Ej: Garveloth">
          </div>
          <div class="form-group">
            <label class="form-label">Spawn Mínimo</label>
            <div class="spawn-field">
              <input type="number" id="addMin" class="form-input" placeholder="30" min="1">
              <select id="addMinType" class="form-select">
                <option value="minutes">min</option>
                <option value="hours">h</option>
                <option value="days">días</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Spawn Máximo</label>
            <div class="spawn-field">
              <input type="number" id="addMax" class="form-input" placeholder="45" min="1">
              <select id="addMaxType" class="form-select">
                <option value="minutes">min</option>
                <option value="hours">h</option>
                <option value="days">días</option>
              </select>
            </div>
          </div>
        </div>
        <button class="btn-add" id="btnAddBoss" onclick="addBoss()">+ Agregar Boss</button>
      </div>

      <div class="tab-panel" id="tab-manage">
        <div id="manageList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── SUPABASE ───────────────────────────────────────────
const SUPA_URL = "https://zlwwlshxbvmvotwrffoz.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsd3dsc2h4YnZtdm90d3JmZm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTMxNzgsImV4cCI6MjA5NTMyOTE3OH0.3E42PrCq7T61qF8iGcqOd1a9KN1xZ-levUJ21fSFw5Y";
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ── STATE ──────────────────────────────────────────────
let bosses = [];
let currentFilter = "all";

// ── CONNECTION BADGE ───────────────────────────────────
function setConn(state) {
  const badge = document.getElementById("connBadge");
  const text  = document.getElementById("connText");
  badge.className = "conn-badge";
  if (state === "online")  { badge.classList.add("conn-online");  text.textContent = "EN LÍNEA"; }
  if (state === "offline") { badge.classList.add("conn-offline"); text.textContent = "SIN CONEXIÓN"; }
  if (state === "loading") { badge.classList.add("conn-loading"); text.textContent = "CONECTANDO"; }
}

// ── TIME HELPERS ───────────────────────────────────────
function toMinutes(v, t) {
  if (t === "hours") return v * 60;
  if (t === "days")  return v * 1440;
  return v;
}
function fmtSpawn(m) {
  if (m >= 1440) {
    const d = Math.floor(m / 1440), rem = m % 1440, h = Math.floor(rem / 60), min = rem % 60;
    return h > 0 ? `${d}d ${h}h` : min > 0 ? `${d}d ${min}m` : `${d}d`;
  }
  if (m >= 60) { const h = Math.floor(m / 60), min = m % 60; return min > 0 ? `${h}h ${min}m` : `${h}h`; }
  return `${m}m`;
}
function fmtFullDate(d) {
  return new Date(d).toLocaleString("es-AR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}
function fmtTime(d) {
  return d.toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
}
function fmtCountdown(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

// ── CLOCK ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("liveClock").textContent =
    now.toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  document.getElementById("liveDate").textContent =
    now.toLocaleDateString("es-AR", { weekday:"short", day:"2-digit", month:"short" }).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// ── FILTER ─────────────────────────────────────────────
const FILTERS = [
  { key:"all",          label:"Todos" },
  { key:"unregistered", label:"Sin registrar" },
  { key:"waiting",      label:"Esperando" },
  { key:"spawn",        label:"En rango" },
];
function passFilter(boss, filter) {
  if (filter === "all") return true;
  if (filter === "unregistered") return !boss.last_kill;
  if (!boss.last_kill) return false;
  const now = Date.now(), kill = new Date(boss.last_kill).getTime(), minMs = boss.min_spawn * 60000;
  if (filter === "spawn")   return (now - kill) >= minMs;
  if (filter === "waiting") return (now - kill) < minMs;
  return false;
}
function buildFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = FILTERS.map(f => `
    <button class="filter-btn ${currentFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">
      ${f.label}<span class="filter-count">${bosses.filter(b=>passFilter(b,f.key)).length}</span>
    </button>
  `).join("");
}
function setFilter(key) { currentFilter = key; render(); }

// ── STATUS ─────────────────────────────────────────────
function getStatus(boss) {
  if (!boss.last_kill) return { cls:"none", badge:"SIN TIMER", badgeCls:"badge-none", timerTxt:"—", timerCls:"timer-none", progress:0, progCls:"prog-green", spawnWindow:"—" };
  const now = Date.now(), kill = new Date(boss.last_kill).getTime();
  const minMs = boss.min_spawn * 60000, maxMs = boss.max_spawn * 60000;
  const minDate = new Date(kill + minMs), maxDate = new Date(kill + maxMs);
  const diff = minDate.getTime() - now;
  const spawnWindow = `${fmtTime(minDate)} → ${fmtTime(maxDate)}`;
  const progress = Math.min(100, Math.max(0, ((now - kill) / minMs) * 100));
  if (diff <= 0)        return { cls:"red",    badge:"⚠ SPAWN",  badgeCls:"badge-red",    timerTxt:"EN RANGO",          timerCls:"timer-red",    progress:100,    progCls:"prog-red",    spawnWindow };
  if (diff <= 600000)   return { cls:"yellow", badge:"PRÓXIMO",  badgeCls:"badge-yellow", timerTxt:fmtCountdown(diff),  timerCls:"timer-yellow", progress,        progCls:"prog-yellow", spawnWindow };
  return                       { cls:"green",  badge:"SEGURO",   badgeCls:"badge-green",  timerTxt:fmtCountdown(diff),  timerCls:"timer-green",  progress,        progCls:"prog-green",  spawnWindow };
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  buildFilters();
  const grid = document.getElementById("bossGrid");
  const visible = bosses.filter(b => passFilter(b, currentFilter));
  if (!visible.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🗡</div><p>Sin bosses en este filtro</p><small>Cambia el filtro o agrega bosses desde Admin</small></div>`;
    return;
  }
  grid.innerHTML = visible.map(boss => {
    const s = getStatus(boss);
    return `
      <div class="boss-card status-${s.cls}">
        <div class="card-accent"></div>
        <div class="card-header">
          <div class="boss-name">${boss.name}</div>
          <span class="status-badge ${s.badgeCls}">${s.badge}</span>
        </div>
        <div class="card-body">
          <div class="info-row">
            <span class="icon">⏱</span>
            <span class="info-val">${fmtSpawn(boss.min_spawn)} – ${fmtSpawn(boss.max_spawn)}</span>
            <span style="color:var(--text3);font-size:13px">rango spawn</span>
          </div>
          <div class="info-row">
            <span class="icon">📍</span>
            <span class="info-val">${s.spawnWindow}</span>
          </div>
          <div class="info-row">
            <span class="icon">☠</span>
            <span>${boss.last_kill ? fmtFullDate(boss.last_kill) : '<span style="color:var(--text3)">Sin registrar</span>'}</span>
          </div>
        </div>
        <div class="timer-area">
          <div class="timer-big ${s.timerCls}">${s.timerTxt}</div>
          <div class="timer-sub">${s.cls==='red'?'PUEDE HABER SPAWN':s.cls==='none'?'sin datos':'para spawn mínimo'}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill ${s.progCls}" style="width:${s.progress}%"></div>
        </div>
        <div class="card-footer">
          <button class="card-btn btn-now" onclick="killNow(${boss.id})">⚔ NOW</button>
          <button class="card-btn btn-manual" onclick="killManual(${boss.id})">🕐 Manual</button>
        </div>
      </div>`;
  }).join("");
  renderManageList();
}

// ── SUPABASE LOAD & REALTIME ───────────────────────────
async function loadBosses() {
  setConn("loading");
  const { data, error } = await db.from("bosses").select("*").order("id");
  if (error) { setConn("offline"); return; }
  bosses = data;
  setConn("online");
  render();
}

// Suscripción realtime: cualquier cambio en la tabla se refleja al instante en todos
db.channel("bosses-realtime")
  .on("postgres_changes", { event: "*", schema: "public", table: "bosses" }, payload => {
    if (payload.eventType === "INSERT") {
      bosses.push(payload.new);
    } else if (payload.eventType === "UPDATE") {
      const i = bosses.findIndex(b => b.id === payload.new.id);
      if (i !== -1) bosses[i] = payload.new;
    } else if (payload.eventType === "DELETE") {
      bosses = bosses.filter(b => b.id !== payload.old.id);
    }
    render();
  })
  .subscribe(status => {
    if (status === "SUBSCRIBED") setConn("online");
    if (status === "CLOSED" || status === "CHANNEL_ERROR") setConn("offline");
  });

// ── KILL ACTIONS ───────────────────────────────────────
async function killNow(id) {
  const last_kill = new Date().toISOString();
  const { error } = await db.from("bosses").update({ last_kill }).eq("id", id);
  if (error) { Swal.fire({ icon:"error", title:"Error", text:"No se pudo guardar", timer:2000, showConfirmButton:false }); return; }
  Swal.fire({ icon:"success", title:"Timer iniciado", text:"Kill registrada ahora", timer:1200, showConfirmButton:false });
}

async function killManual(id) {
  const boss = bosses.find(b => b.id === id);
  if (!boss) return;
  const { value: time } = await Swal.fire({
    title: `⏱ Hora de muerte — ${boss.name}`,
    html: `<p style="color:var(--text2);margin-bottom:12px;font-size:15px">Ingresá la hora en que mataron al boss</p>`,
    input: "time",
    inputLabel: "Hora de la kill",
    showCancelButton: true,
    confirmButtonText: "Guardar",
    cancelButtonText: "Cancelar",
  });
  if (!time) return;
  const today = new Date();
  const [h, m] = time.split(":").map(Number);
  today.setHours(h, m, 0, 0);
  if (today > new Date()) today.setDate(today.getDate() - 1);
  const { error } = await db.from("bosses").update({ last_kill: today.toISOString() }).eq("id", id);
  if (error) Swal.fire({ icon:"error", title:"Error", text:"No se pudo guardar", timer:2000, showConfirmButton:false });
}

// ── ADMIN ──────────────────────────────────────────────
function openAdmin() {
  const pw = prompt("🔒 Contraseña Admin:");
  if (pw !== "admin123") { alert("Contraseña incorrecta"); return; }
  document.getElementById("adminOverlay").classList.add("open");
  renderManageList();
}
function closeAdmin() { document.getElementById("adminOverlay").classList.remove("open"); }
document.getElementById("adminOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("adminOverlay")) closeAdmin();
});

function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", (i===0&&tab==="add")||(i===1&&tab==="manage")));
  document.querySelectorAll(".tab-panel").forEach((p,i) => p.classList.toggle("active", (i===0&&tab==="add")||(i===1&&tab==="manage")));
  if (tab === "manage") renderManageList();
}

async function addBoss() {
  const name = document.getElementById("addName").value.trim();
  const rawMin = parseFloat(document.getElementById("addMin").value);
  const rawMax = parseFloat(document.getElementById("addMax").value);
  const minT = document.getElementById("addMinType").value;
  const maxT = document.getElementById("addMaxType").value;
  if (!name || !rawMin || !rawMax) { alert("Completá todos los campos"); return; }
  const min_spawn = toMinutes(rawMin, minT);
  const max_spawn = toMinutes(rawMax, maxT);
  if (min_spawn > max_spawn) { alert("El mínimo no puede ser mayor al máximo"); return; }
  const btn = document.getElementById("btnAddBoss");
  btn.disabled = true; btn.textContent = "Guardando...";
  const { error } = await db.from("bosses").insert({ name, min_spawn, max_spawn, last_kill: null });
  btn.disabled = false; btn.textContent = "+ Agregar Boss";
  if (error) { alert("Error al guardar: " + error.message); return; }
  document.getElementById("addName").value = "";
  document.getElementById("addMin").value = "";
  document.getElementById("addMax").value = "";
  Swal.fire({ icon:"success", title:"Boss agregado", text:`${name} fue añadido al tracker`, timer:1500, showConfirmButton:false });
}

function renderManageList() {
  const el = document.getElementById("manageList");
  if (!el) return;
  if (!bosses.length) { el.innerHTML = `<p style="color:var(--text3);text-align:center;padding:40px">No hay bosses registrados</p>`; return; }
  el.innerHTML = bosses.map(boss => `
    <div class="boss-list-item" id="item-${boss.id}">
      <div class="boss-list-info">
        <div class="boss-list-name">${boss.name}</div>
        <div class="boss-list-timing">${fmtSpawn(boss.min_spawn)} – ${fmtSpawn(boss.max_spawn)} spawn</div>
        <div class="boss-list-kill">${boss.last_kill ? '☠ Kill: ' + fmtFullDate(boss.last_kill) : '⬜ Sin timer'}</div>
      </div>
      <div class="boss-list-actions">
        <button class="list-btn btn-edit" onclick="startEdit(${boss.id})">✏ Editar</button>
        <button class="list-btn btn-reset" onclick="resetBoss(${boss.id})">↺ Reset</button>
        <button class="list-btn btn-delete" onclick="deleteBoss(${boss.id})">✕ Borrar</button>
      </div>
    </div>
    <div id="edit-${boss.id}" style="display:none;margin:-6px 0 10px;padding:0 4px">
      <div class="edit-form">
        <div class="form-grid" style="margin-bottom:10px">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" id="eName-${boss.id}" class="form-input" value="${boss.name}">
          </div>
          <div class="form-group">
            <label class="form-label">Spawn Mín</label>
            <div class="spawn-field">
              <input type="number" id="eMin-${boss.id}" class="form-input" value="${boss.min_spawn}">
              <select id="eMinT-${boss.id}" class="form-select"><option value="minutes" selected>min</option><option value="hours">h</option><option value="days">días</option></select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Spawn Máx</label>
            <div class="spawn-field">
              <input type="number" id="eMax-${boss.id}" class="form-input" value="${boss.max_spawn}">
              <select id="eMaxT-${boss.id}" class="form-select"><option value="minutes" selected>min</option><option value="hours">h</option><option value="days">días</option></select>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-add" style="margin:0" onclick="saveEdit(${boss.id})">✓ Guardar cambios</button>
          <button class="list-btn btn-delete" style="padding:11px 18px" onclick="cancelEdit(${boss.id})">Cancelar</button>
        </div>
      </div>
    </div>
  `).join("");
}

function startEdit(id) {
  bosses.forEach(b => { const el = document.getElementById(`edit-${b.id}`); if (el) el.style.display = "none"; });
  const el = document.getElementById(`edit-${id}`);
  if (el) el.style.display = "block";
}
function cancelEdit(id) { const el = document.getElementById(`edit-${id}`); if (el) el.style.display = "none"; }

async function saveEdit(id) {
  const name = document.getElementById(`eName-${id}`).value.trim();
  const rawMin = parseFloat(document.getElementById(`eMin-${id}`).value);
  const rawMax = parseFloat(document.getElementById(`eMax-${id}`).value);
  const minT = document.getElementById(`eMinT-${id}`).value;
  const maxT = document.getElementById(`eMaxT-${id}`).value;
  if (!name || !rawMin || !rawMax) { alert("Completá todos los campos"); return; }
  const min_spawn = toMinutes(rawMin, minT);
  const max_spawn = toMinutes(rawMax, maxT);
  const { error } = await db.from("bosses").update({ name, min_spawn, max_spawn }).eq("id", id);
  if (error) { alert("Error al guardar: " + error.message); return; }
  cancelEdit(id);
}

async function resetBoss(id) {
  if (!confirm("¿Resetear el timer de este boss?")) return;
  await db.from("bosses").update({ last_kill: null }).eq("id", id);
}

async function deleteBoss(id) {
  const boss = bosses.find(b => b.id === id);
  if (!boss) return;
  if (!confirm(`¿Eliminar a ${boss.name}?`)) return;
  await db.from("bosses").delete().eq("id", id);
}

// ── INIT ───────────────────────────────────────────────
loadBosses();
setInterval(render, 1000);
</script>
</body>
